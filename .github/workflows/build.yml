name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Install SDK components
      run: |
        & "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat" --install "ndk;20.1.5948944" "cmake;3.10.2.4988404" "platforms;android-28" "build-tools;28.0.3"
    
    - name: Create local.properties
      run: |
        Add-Content -Path local.properties -Value "sdk.dir=C:\Android\android-sdk"
        Add-Content -Path local.properties -Value "ndk.dir=C:\Android\android-sdk\ndk\20.1.5948944"
    
    - name: Build Debug APK
      run: .\gradlew.bat assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SeriousSamAndroid-debug
        path: app/build/outputs/apk/debug/*.apk
