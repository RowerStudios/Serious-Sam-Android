name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 28
        build-tools: 28.0.3
    
    - name: Install NDK and CMake
      run: |
        & "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat" --install "ndk;20.1.5948944" "cmake;3.10.2.4988404"
    
    - name: Create local.properties
      run: |
        "sdk.dir=$env:ANDROID_HOME" | Out-File -FilePath local.properties -Encoding UTF8
        "ndk.dir=$env:ANDROID_HOME\ndk\20.1.5948944" | Out-File -FilePath local.properties -Encoding UTF8 -Append
    
    - name: Build Debug APK
      run: .\gradlew.bat assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SeriousSamAndroid-debug
        path: app/build/outputs/apk/debug/*.apk
